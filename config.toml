[ollama]
base_url   = "http://localhost:11434"
chat_model = "qwen3:8b"
embed_model = "bge-m3"
vision_model = "qwen3-vl:8b"
# NOTE: loop_model is reserved for a planned loop-runner and is not yet read by any runtime code.
loop_model = "qwen3-coder:30b"
keep_alive = "5m"

[retrieval]
top_k = 8
tau = 0.55              # cosine-similarity floor; max_score < tau => refuse (spec §B)
embed_dim = 1024
chunk_min_tokens = 128
chunk_max_tokens = 512
chunk_overlap = 0.15
# --- Hybrid retrieval (BM25 sparse + dense fusion). Scaffolding for KB growth. ---
# fusion: "rrf" = Reciprocal Rank Fusion of dense+sparse; "dense" = exact legacy
#         dense-only path (kill switch, byte-for-byte pre-hybrid behaviour).
# DEFAULT = "dense" (resolves the hybrid council's unresolved dissent with LIVE
#   eval evidence): on the current 27-chunk golden set, fusion="rrf" REGRESSES
#   MRR 1.000 -> 0.962 (BM25 promotes a lexical near-miss, "Python Mk II"),
#   while "dense" holds recall@5=1.000 / MRR=1.000. The spec mandates a
#   non-regression gate, so we ship the non-regressing default; the full RRF
#   path is built, tested, and ONE flip away. Flip to "rrf" once the KB grows
#   and eval shows rrf MRR/recall >= dense (the falsifiable scaffold-for-growth
#   condition; see copilot/sparse.py value-now verdict + .claude council ledger).
# Grounding ALWAYS uses dense cosine vs tau (never the RRF score), so refusal
# can't be laundered by a high BM25 score regardless of this setting.
fusion = "dense"
rrf_k = 60              # RRF smoothing constant (Cormack & Clarke 2009)
candidate_k = 32        # wide per-backend candidate set before fusion narrows to top_k
rerank = "off"          # "off" | "llm" | "cross_encoder"; off at this corpus size (no measured gain)

[copilot]
mode = "verified_only"  # "verified_only" | "include_unverified"
forced_citation = true
max_regen = 1
# When true, a cited claim must share content with the chunk it cites, so a
# confident WRONG answer with a real [id] attached is rejected, not trusted.
# Lexical/conservative (catches fabrication, passes paraphrase). 2026-06-03.
claim_grounding_check = true
# Multi-hop query decomposition (Decision A: DEFER). Default false = today's
# exact single-retrieve path. When true, copilot.multihop.decompose() splits
# the query into sub-queries, retrieves each, unions the chunks (dedup by
# chunk_id, max_score = max over union), then runs a SINGLE generation pass
# over the union result with the UNCHANGED validate_answer gate.
# Flip to true only after copilot.eval.retrieval_metrics shows recall_at_k on
# the "multihop": true golden subset materially below single-hop recall_at_k.
multihop = false

[paths]
kb = "kb"
embeddings = "embeddings"
indexes = "indexes"
cmdr_profile = "cmdr/duvrazh.md"

# NOTE: [loop] keys are reserved for a planned loop-runner and are not yet read by any runtime code.
[loop]
verification_tier = 1               # 1=capture, 2=consensus, 3=currency-purge
git_commit_every_loop = true
deep_analysis_after_empty_loops = 5

# Council-v2-style local verification for KB fact-checking.
# verify_claim() reads all keys here; the loop integration (ed-research-prompt.md PHASE 4.5)
# is wired but the cloud-council escalation path requires manual invocation of the `council`
# skill — it cannot be auto-triggered from inside an autonomous headless loop.
[verify]
enabled = true
local_models = ["qwen3-coder:30b", "qwen3:8b"]   # blind assessors; first model also arbitrates
escalate_threshold = 0.66  # escalate when confidence < this value
min_sources_for_consensus = 2  # NOTE: threshold read by loop; verify_claim() uses sources list length
